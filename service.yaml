apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nexus-ai
spec:
  template:
    spec:
      containers:
      - image: gcr.io/your-project-id/nexus-ai # Replace with your image registry
        ports:
        - containerPort: 8080
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "your-project-id" # Replace
        - name: GOOGLE_CLOUD_LOCATION
          value: "us-central1" # Replace
